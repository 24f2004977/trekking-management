{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-8 offset-md-2">
        
        <!-- Back Navigation consistent with theme -->
        <div class="mb-3">
            <a href="/admin_dashboard" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <!-- Header matching Dashboard & Add Staff theme -->
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0"><i class="bi bi-map-fill me-2"></i> Launch New Trek Expedition</h5>
            </div>
            
            <div class="card-body p-4">
                <form method="POST">
                    
                    <!-- Section 1: Route Details -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">
                            <i class="bi bi-info-circle"></i> Route Information
                        </label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" name="name" class="form-control" placeholder="Trek Name (e.g. Kedarkantha)" required>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" name="location" class="form-control" placeholder="Location / State" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="text-muted opacity-25">

                    <!-- Section 2: Logistics & Capacity -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">
                            <i class="bi bi-calendar-event"></i> Logistics & Capacity
                        </label>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <select name="difficulty" class="form-select" required>
                                    <option value="" disabled selected>Difficulty Level</option>
                                    <option>Easy</option>
                                    <option>Moderate</option>
                                    <option>Hard</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="number" name="duration" class="form-control" placeholder="Duration (Days)" min="1" required>
                            </div>
                            <div class="col-md-4">
                                <input type="number" name="slots" class="form-control" placeholder="Total Slots" min="1" required>
                            </div>
                        </div>
                    </div>

                    <!-- Dates Section -->
                    <div class="mb-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Expedition Start Date</label>
                                <input type="date" name="start_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Expedition End Date</label>
                                <input type="date" name="end_date" class="form-control" required>
                            </div>
                        </div>
                    </div>

                    <hr class="text-muted opacity-25">

                    <!-- Section 3: Pricing & Assignment -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">
                            <i class="bi bi-person-badge"></i> Pricing & Leadership
                        </label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-light">₹</span>
                                    <input type="number" step="0.01" name="price" class="form-control" placeholder="Price Per Person" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <select name="staff_id" class="form-select" required>
                                    <option value="">-- Assign Trek Leader --</option>
                                    {% for s in staff %}
                                    <option value="{{ s.id }}">{{ s.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Description & Highlights</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Briefly describe the route and what's included..."></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/admin_dashboard" class="btn btn-light border px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 shadow-sm">
                            <i class="bi bi-rocket-takeoff"></i> Launch Expedition
                        </button>
                    </div>

                </form>
            </div>
        </div>
        
        <!-- Quick Note -->
        <p class="text-center text-muted small mt-3">
            <i class="bi bi-info-circle"></i> Once launched, this trek will be visible to all users for booking.
        </p>

    </div>
</div>

{% endblock %}
