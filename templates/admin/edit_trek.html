{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-8 offset-md-2">
        
        <!-- Back Navigation -->
        <div class="mb-3">
            <a href="/admin_dashboard" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <!-- Header matching Dashboard & Add Staff/Trek theme -->
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i> Edit Trek Expedition: {{ trek.name }}</h5>
            </div>
            
            <div class="card-body p-4">
                <form method="POST">
                    
                    <!-- Section 1: Basic Info -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">
                            <i class="bi bi-info-circle"></i> Route & Logistics
                        </label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="small text-muted">Trek Name</label>
                                <input type="text" name="name" class="form-control" value="{{ trek.name }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted">Location</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" name="location" class="form-control" value="{{ trek.location }}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="small text-muted">Difficulty</label>
                            <select name="difficulty" class="form-select" required>
                                <option value="Easy" {% if trek.difficulty == 'Easy' %}selected{% endif %}>Easy</option>
                                <option value="Moderate" {% if trek.difficulty == 'Moderate' %}selected{% endif %}>Moderate</option>
                                <option value="Hard" {% if trek.difficulty == 'Hard' %}selected{% endif %}>Hard</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted">Duration (Days)</label>
                            <input type="number" name="duration" class="form-control" value="{{ trek.duration }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="small text-muted">Total Slots</label>
                            <input type="number" name="slots" class="form-control" value="{{ trek.total_slots }}" required>
                        </div>
                    </div>

                    <hr class="text-muted opacity-25">

                    <!-- Section 2: Management & Status -->
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">
                            <i class="bi bi-gear"></i> Expedition Status & Assignment
                        </label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="small text-muted">Current Status</label>
                                <select name="status" class="form-select">
                                    <option value="Open" {% if trek.status=='Open' %}selected{% endif %}>Open (Booking On)</option>
                                    <option value="Closed" {% if trek.status=='Closed' %}selected{% endif %}>Closed (Full/Pause)</option>
                                    <option value="Completed" {% if trek.status=='Completed' %}selected{% endif %}>Completed</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted">Price per Trekker (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">₹</span>
                                    <input type="number" step="0.01" name="price" class="form-control" value="{{ trek.price_per_person }}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="small text-muted">Assign/Change Trek Leader</label>
                        <select name="staff_id" class="form-select">
                            {% for s in staff %}
                            <option value="{{ s.id }}" {% if s.id == trek.staff_id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Action Buttons matching Dashboard theme -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-2">
                        <a href="/admin_dashboard" class="btn btn-light border px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 shadow-sm">
                            <i class="bi bi-save"></i> Save Changes
                        </a>
                    </div>

                </form>
            </div>
        </div>
        
        <p class="text-center text-muted small mt-3">
            <i class="bi bi-info-circle"></i> Updates will be reflected immediately on the user dashboard.
        </p>

    </div>
</div>

{% endblock %}
