{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="mb-3">
            <a href="/staff_dashboard" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0"><i class="bi bi-gear-wide-connected me-2"></i> Update Expedition Progress</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <h5 class="fw-bold text-primary mb-1">{{ trek.name }}</h5>
                    <p class="text-muted small mb-4"><i class="bi bi-geo-alt"></i> {{ trek.location }}</p>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Expedition Status</label>
                        <select name="status" class="form-select form-select-lg shadow-sm border-primary">
                            <option value="Open" {% if trek.status == 'Open' %}selected{% endif %}>Open (Bookings Active)</option>
                            <option value="In Progress" {% if trek.status == 'In Progress' %}selected{% endif %}>In Progress (Trek Started)</option>
                            <option value="Completed" {% if trek.status == 'Completed' %}selected{% endif %}>Completed (Expedition Over)</option>
                            <option value="Closed" {% if trek.status == 'Closed' %}selected{% endif %}>Closed / Paused</option>
                        </select>
                        <div class="form-text small text-info mt-2">
                            <i class="bi bi-info-circle"></i> Marking as 'Completed' will stop further bookings.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Update Available Slots</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person-plus"></i></span>
                            <input type="number" name="available_slots" class="form-control" value="{{ trek.available_slots }}" max="{{ trek.total_slots }}">
                        </div>
                        <small class="text-muted">Total capacity: {{ trek.total_slots }} seats.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Save Progress Updates</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
